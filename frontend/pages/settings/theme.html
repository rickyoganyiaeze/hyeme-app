<div class="screen active" style="display:flex !important; flex-direction:column; height:100%; background:var(--bg-main);">
    
    <div class="app-header" style="background:var(--bg-main);">
        <div style="display:flex;align-items:center;gap:12px;">
            <i class="fas fa-arrow-left" id="back-settings-theme" style="cursor:pointer;font-size:18px;color:var(--primary);"></i>
            <h2 style="font-size:18px;">Theme</h2>
        </div>
    </div>

    <div style="flex:1;overflow-y:auto;padding:20px;">
        <h3 style="font-size:16px;margin-bottom:16px;color:var(--text-main);">App Mode</h3>
        <div class="settings-item">
            <div class="settings-text">
                <h4>Dark Mode</h4>
                <p>Easier on the eyes in low light</p>
            </div>
            <input type="checkbox" id="dark-toggle" style="width:20px;height:20px;accent-color:var(--primary);cursor:pointer;">
        </div>

        <h3 style="font-size:16px;margin:24px 0 16px;color:var(--text-main);">Accent Color</h3>
        <div style="display:flex;gap:16px;padding:0 16px;margin-bottom:32px;">
            <div style="width:40px;height:40px;border-radius:50%;background:#7C3AED;border:2px solid var(--text-main);cursor:pointer;"></div>
            <div style="width:40px;height:40px;border-radius:50%;background:#2563EB;cursor:pointer;"></div>
            <div style="width:40px;height:40px;border-radius:50%;background:#16A34A;cursor:pointer;"></div>
            <div style="width:40px;height:40px;border-radius:50%;background:#EF4444;cursor:pointer;"></div>
        </div>

        <h3 style="font-size:16px;margin-bottom:16px;color:var(--text-main);">Chat Background</h3>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;">
            <div style="height:80px;background:var(--bg-secondary);border-radius:8px;border:2px solid var(--primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-secondary);">Default</div>
            <div style="height:80px;background:#0f172a;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;">Dark</div>
            <div style="height:80px;background:linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;">Gradient</div>
        </div>
    </div>
</div>
