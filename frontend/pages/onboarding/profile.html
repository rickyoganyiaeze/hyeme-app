<div class="screen active" style="display:flex !important; background: var(--bg-main);">
    <div class="auth-container" style="justify-content: center; align-items: center; padding: 32px;">
        
        <!-- Back Button -->
        <div style="text-align: left; width: 100%; margin-bottom: 24px;">
            <i class="fas fa-arrow-left" id="back-profile-btn" style="font-size: 20px; color: var(--primary); cursor: pointer;"></i>
        </div>

        <h1 style="font-size: 24px; margin-bottom: 8px; color: var(--text-main);">Profile Picture</h1>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 24px;">Visible publicly</p>
        
        <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--bg-secondary); margin-bottom: 32px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--primary);">
            <i class="fas fa-camera" style="font-size: 32px; color: var(--primary);" id="avatar-preview-icon"></i>
            <img id="avatar-preview-img" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
        </div>
        
        <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
        <button class="btn-primary btn-interactive" style="width: auto; padding: 10px 24px; box-shadow: none; margin-bottom: 16px;" onclick="document.getElementById('avatar-upload').click()">Upload Photo</button>
        
        <button class="btn-primary btn-interactive" id="profile-done-btn" style="box-shadow: none; height: 50px; font-size: 16px; width: 100%;">Finish Setup</button>
    </div>
</div>
