<div class="screen active" style="display:flex !important; background: var(--bg-main);">
    <div class="auth-container" style="justify-content: center; padding: 32px;">
        
        <!-- Back Button -->
        <div style="text-align: left; width: 100%; margin-bottom: 24px;">
            <i class="fas fa-arrow-left" id="back-about-btn" style="font-size: 20px; color: var(--primary); cursor: pointer;"></i>
        </div>

        <h1 style="font-size: 24px; margin-bottom: 8px; color: var(--text-main);">About you</h1>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 32px;">Write a short bio</p>
        
        <div class="input-group" style="margin-bottom: 32px;">
            <textarea id="user-about" rows="4" placeholder="Hey there! I am using HyeMe." style="resize: none; width: 100%; padding: 16px; border: none; font-size: 16px; background: var(--bg-secondary); color: var(--text-main); border-radius: 12px; outline: none;"></textarea>
        </div>
        
        <button class="btn-primary btn-interactive" id="about-next-btn" style="box-shadow: none; height: 50px; font-size: 16px; width: 100%;">Next</button>
    </div>
</div>
