<div class="screen active" style="display:flex !important; background: var(--bg-main);">
    <div class="auth-container" style="justify-content: center; align-items: center; padding: 32px; text-align: center;">
        
        <div style="text-align: left; width: 100%; margin-bottom: 24px;">
            <i class="fas fa-arrow-left" id="back-to-profile" style="font-size: 20px; color: var(--primary); cursor: pointer;"></i>
        </div>

        <h1 style="font-size: 24px; margin-bottom: 8px; color: var(--text-main);">Confirm Details</h1>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 32px;">Please check your information before proceeding.</p>
        
        <!-- Profile Preview -->
        <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--bg-secondary); margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid var(--primary);">
            <i class="fas fa-user" id="confirm-avatar-icon" style="font-size: 48px; color: var(--primary); display: none;"></i>
            <img id="confirm-avatar-img" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
        </div>

        <!-- Text Details -->
        <div style="text-align: left; width: 100%; background: var(--bg-secondary); padding: 20px; border-radius: 12px;">
            <div style="margin-bottom: 12px;">
                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">Name</p>
                <h3 id="confirm-name" style="font-size: 18px; color: var(--text-main);">Name</h3>
            </div>
            <div>
                <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 4px;">About</p>
                <p id="confirm-about" style="font-size: 14px; color: var(--text-main); line-height: 1.4;">About...</p>
            </div>
        </div>

        <!-- Buttons -->
        <button class="btn-primary" id="confirm-submit-btn" style="width: 100%; margin-top: 32px; box-shadow: none; height: 50px; font-size: 16px; font-weight: 600;">
            Looks Good
        </button>
        <button class="btn-skip" id="confirm-edit-btn" style="margin-top: 12px;">Edit Details</button>

    </div>
</div>
