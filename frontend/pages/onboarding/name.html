<div class="screen active" style="display:flex !important; background: var(--bg-main);">
    <div class="auth-container" style="justify-content: center; align-items: center; padding: 32px;">
        
        <!-- Back Button -->
        <div style="text-align: left; width: 100%; margin-bottom: 24px;">
            <i class="fas fa-arrow-left" id="back-name-btn" style="font-size: 20px; color: var(--primary); cursor: pointer;"></i>
        </div>

        <h1 style="font-size: 24px; margin-bottom: 8px; color: var(--text-main);">What's your name?</h1>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 32px;">Enter the name people will see</p>
        
        <div class="input-group" style="width: 100%; margin-bottom: 32px;">
            <input type="text" id="user-name" placeholder="Type your name here..." style="width: 100%; padding: 16px; border: none; font-size: 18px; background: var(--bg-secondary); color: var(--text-main); border-radius: 12px; outline: none; text-align: center;">
        </div>
        
        <button class="btn-primary btn-interactive" id="name-next-btn" style="box-shadow: none; height: 50px; font-size: 16px; width: 100%;">Next</button>
    </div>
</div>
