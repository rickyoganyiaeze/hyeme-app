<div class="screen active" style="display:flex;flex-direction:column;height:100%;">
    <div class="app-header">
        <h2>Explore</h2>
        <i class="fas fa-camera"></i>
    </div>
    <div style="padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border-color);">
        <div style="position:relative;width:60px;height:60px;border-radius:50%;border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;background:var(--bg-secondary);cursor:pointer;">
            <i class="fas fa-plus" style="font-size:24px;color:var(--primary);"></i>
        </div>
        <div>
            <div style="font-size:14px;font-weight:600;">My Status</div>
            <div style="font-size:12px;color:var(--text-secondary);">Tap to add status update</div>
        </div>
    </div>
    <div style="padding:16px 16px 8px;"><p style="font-size:13px;font-weight:600;color:var(--text-secondary);">RECENT UPDATES</p></div>
    <div class="explore-grid" style="padding:0 16px;flex:1;overflow-y:auto;">
        <div class="explore-item" style="background:var(--primary-light);"></div>
        <div class="explore-item" style="background:var(--primary);"></div>
        <div class="explore-item" style="background:var(--bg-secondary);"></div>
        <div class="explore-item" style="background:var(--primary-dark);"></div>
    </div>
</div>
