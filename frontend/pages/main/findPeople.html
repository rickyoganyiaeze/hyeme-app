<div class="screen active" style="display:flex !important; flex-direction:column; height:100%; background:var(--bg-main);">
    
    <div class="app-header" style="background:var(--bg-main);">
        <div style="display:flex;align-items:center;gap:12px;">
            <i class="fas fa-arrow-left" id="back-to-chats-from-find" style="cursor:pointer;font-size:18px;color:var(--primary);"></i>
            <h2 style="font-size:18px;">Find People</h2>
        </div>
    </div>

    <!-- Search Bar -->
    <div style="padding:12px 16px;background:var(--bg-main);">
        <div style="display:flex;align-items:center;gap:10px;background:var(--bg-secondary);border-radius:8px;padding:0 12px;">
            <i class="fas fa-search" style="color:var(--text-secondary);font-size:14px;"></i>
            <input type="text" id="find-people-input" placeholder="Search by name or number..." style="flex:1;padding:10px;border:none;background:transparent;font-size:14px;color:var(--text-main);outline:none;">
        </div>
    </div>

    <!-- Search Results -->
    <div class="chat-list-container" id="find-people-results" style="flex:1;overflow-y:auto;">
        <p style="padding:40px;text-align:center;color:var(--text-secondary);">Search for users to start chatting</p>
    </div>
</div>
