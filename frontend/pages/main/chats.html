<div class="screen active" style="display:flex !important; flex-direction:column; height:100%; background:var(--bg-main);">
    
    <!-- TOP SEARCH BAR & PURPLE MESSAGE BUTTON -->
    <div style="padding:12px 16px; background:var(--bg-main); display:flex; gap:10px; align-items:center;">
        <div style="flex:1;display:flex;align-items:center;gap:10px;background:var(--bg-secondary);border-radius:8px;padding:0 12px;">
            <i class="fas fa-search" style="color:var(--text-secondary);font-size:14px;"></i>
            <input type="text" id="search-chats-input" placeholder="Search chats or people..." style="flex:1;padding:10px;border:none;background:transparent;font-size:14px;color:var(--text-main);outline:none;">
        </div>
        <button id="open-find-people-btn" style="background:var(--primary);border:none;color:white;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;box-shadow:none;">
            <i class="fas fa-comment-medical"></i>
        </button>
    </div>

    <!-- CHAT LIST -->
    <div class="chat-list-container" id="chat-list" style="flex:1;overflow-y:auto;">
        <!-- Items will be injected here by chat.js -->
    </div>

    <!-- BOTTOM ICONS (Explore & Find People) -->
    <div style="padding:12px;border-top:1px solid var(--border-color);display:flex;gap:12px;">
        <div id="explore-btn-bottom" style="flex:1;text-align:center;cursor:pointer;color:var(--primary);padding:4px;">
            <i class="fas fa-compass" style="font-size:20px;"></i>
            <p style="font-size:11px;margin-top:4px;">Explore</p>
        </div>
        <div id="find-people-btn-bottom" style="flex:1;text-align:center;cursor:pointer;color:var(--primary);padding:4px;">
            <i class="fas fa-user-plus" style="font-size:20px;"></i>
            <p style="font-size:11px;margin-top:4px;">Find People</p>
        </div>
    </div>
</div>
