<div class="screen active" style="display:flex !important; background: var(--bg-main);">
    <div class="auth-container" style="justify-content: center; padding: 32px;">
        
        <!-- ADDED: HyeMe Logo -->
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-comment-dots" style="font-size: 52px; color: var(--primary);"></i>
        </div>

        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 24px; margin-bottom: 16px; color: var(--text-main);">Log in to HyeMe</h1>
            <p style="color: var(--text-secondary); font-size: 14px; line-height: 1.5;">
                Please confirm your country code<br>and enter your phone number.
            </p>
        </div>

        <!-- Error Message UI -->
        <div id="phone-error" style="background:rgba(239, 68, 68, 0.1);border:1px solid rgba(239, 68, 68, 0.2);border-radius:8px;padding:12px;margin-bottom:24px;display:none;align-items:center;gap:8px;">
            <i class="fas fa-exclamation-circle" style="color:var(--danger);font-size:16px;"></i>
            <p id="phone-error-text" style="color:var(--danger);font-size:13px;"></p>
        </div>

        <div class="input-group" style="display: flex; gap: 8px; align-items: flex-start;">
            <div id="country-picker-btn" style="width: 40%; height: 50px; background: var(--bg-secondary); border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; position: relative;">
                <span id="selected-flag" style="font-size: 20px;">🇺🇸</span>
                <span id="selected-code" style="font-size: 14px; color: var(--text-main); font-weight: 500;">+1</span>
                <i class="fas fa-chevron-down" style="font-size: 10px; color: var(--text-secondary); margin-left: auto; margin-right: 10px;"></i>
                
                <div id="country-dropdown" style="display: none; position: absolute; top: 55px; left: 0; width: 260px; background: var(--bg-main); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; overflow: hidden; max-height: 350px; flex-direction: column;">
                    <div style="padding: 12px; border-bottom: 1px solid var(--border-color);">
                        <input type="text" id="country-search" placeholder="Search country..." style="width: 100%; padding: 10px; background: var(--bg-secondary); border: none; border-radius: 8px; font-size: 14px; color: var(--text-main); outline: none; box-sizing: border-box;">
                    </div>
                    <div id="country-list" style="overflow-y: auto; max-height: 280px;"></div>
                </div>
            </div>

            <div style="flex: 1;">
                <input type="tel" id="phone-number" class="input-glow" inputmode="numeric" placeholder="Phone Number" style="width: 100%; padding: 14px; border: none; font-size: 15px; background: var(--bg-secondary); color: var(--text-main); border-radius: 8px; height: 50px; box-sizing: border-box; outline: none;" autocomplete="off">
            </div>
        </div>
        
        <p style="font-size: 12px; color: var(--text-secondary); margin-top: 16px; text-align: center;">
            We will send you a verification code via SMS
        </p>

        <button class="btn-primary btn-interactive" id="send-otp-btn" disabled style="box-shadow: none; height: 50px; font-size: 16px; margin-top: 32px;">
            Next
        </button>

        <div style="margin-top: 48px; text-align: center;">
            <p id="go-to-qrcode" class="qr-link-hover" style="color: var(--primary); font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i class="fas fa-qrcode"></i>
                Log in using QR code (fast & secure)
            </p>
        </div>

    </div>
</div>
