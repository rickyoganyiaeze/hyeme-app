<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HyeMe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        #splash {
            position: fixed;
            inset: 0;
            background: #7C3AED;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #splash h1 {
            font-size: 48px;
            margin-bottom: 12px;
        }

        #splash p {
            font-size: 15px;
            opacity: 0.9;
            max-width: 280px;
            line-height: 1.5;
        }

        #splash i {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="splash">
        <i class="fas fa-comment-dots"></i>
        <h1>HyeMe</h1>
        <p>HyeMe is a secure platform where users have conversations safely.</p>
    </div>

    <div id="app" class="app-container hidden"></div>

    <script type="module" src="js/router.js"></script>
    <script type="module">
        import { initApp } from './js/app.js';

        // FIX: We wait for the 'load' event. 
        // This guarantees ALL javascript files are fully downloaded from Render 
        // before we try to open the app.
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                initApp();
            }, 1500); // 1.5 second splash screen for smooth feel
        });
    </script>
</body>

</html>
